services:
  postgres-test:
    image: postgres:16
    container_name: normativo-postgres-test
    environment:
      POSTGRES_USER: normativo
      POSTGRES_PASSWORD: normativo
      POSTGRES_DB: normativo_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U normativo -d normativo_test"]
      interval: 5s
      timeout: 3s
      retries: 10
